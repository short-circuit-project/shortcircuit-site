<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Short Circuit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      text-align: center;
    }

    .error-content { max-width: 500px; }

    .error-content img {
      width: 220px;
      margin: 0 auto 32px;
      filter: drop-shadow(0 0 30px rgba(0, 166, 251, 0.15));
      animation: shake 0.6s ease-in-out infinite alternate;
    }

    @keyframes shake {
      0% { transform: rotate(-2deg); }
      100% { transform: rotate(2deg); }
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: 5em;
      font-weight: 700;
      background: linear-gradient(135deg, var(--electric-blue), var(--warm-amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }

    .error-content h1 {
      font-family: var(--font-heading);
      font-size: 1.6em;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .error-content p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.7;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <nav class="nav scrolled" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Short <span class="zap">&#9889;</span> Circuit</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="polls.html">Polls</a></li>
        <li><a href="newsletter.html">Newsletter</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="error-page">
    <div class="error-content">
      <img src="assets/shorty-confused.png" alt="Shorty the robot looking confused">
      <div class="error-code">404</div>
      <h1>Shorty hit a bad wire</h1>
      <p>The page you're looking for doesn't exist, got moved, or Shorty accidentally unplugged it. These things happen when you're learning.</p>
      <a href="index.html" class="btn-primary">Back to safety &#8594;</a>
    </div>
  </main>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
  </script>

</body>
</html>
